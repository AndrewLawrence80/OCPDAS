apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-deployment-3
  namespace: autoscaling
spec:
  selector:
    matchLabels:
      app: apache-3
  template:
    metadata:
      labels:
        app: apache-3
    spec:
      containers:
        - name: apache-3
          image: httpd:alpine
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: apache-service-3
  namespace: autoscaling
spec:
  type: NodePort
  selector:
    app: apache-3
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30083
